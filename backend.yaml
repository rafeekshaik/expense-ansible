- name: installing backend
  hosts: backend
  become: yes
  tasks:
  - name: disabling nodejs 16
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enabling node 20
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: install nodejs
    ansible.builtin.package:
       name: "{{ item }}"
       executable: pip3.9
    loop:
    - nodejs
    - mysql
    - PyMySQL
  - name: crete user expense
    ansible.builtin.user:
      name: expense

  - name: create directory
    ansible.builtin.file:
       path: /app
       state: directory

  - name: download the code
    ansible.builtin.get_url:
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
      dest: /tmp/backend.zip

  - name: unzipping the code
    ansible.builtin.unarchive:
      src: /tmp/backend.zip
      dest: /app
      remote_src: yes

  - name: installing node package 
    community.general.npm:
      path: /app

  - name: copying backend service
    ansible.builtin.copy:
     src: backend.service
     dest: /etc/systemd/system/backend.service

  - name: mysql import data
    community.mysql.mysql_db:
      state: import
      name: all
      login_user: root
      login_password: ExpenseApp@1
      login_host: mysql.daws17s.online
      target: /app/schema/backend.sql

    