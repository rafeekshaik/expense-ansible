- name: installing backend
  hosts: backend
  become: yes
  tasks:
  - name: disabling nodejs 16
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enabling node 20
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: install nodejs
    ansible.builtin.package:
       name: nodejs
       state: present
       
