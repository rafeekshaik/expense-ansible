- name: installing mysql-server
  hosts: mysql
  become: yes
- name: credentials
  vars:
   
    rafeek2: DevOps321

  tasks:
  - name: installing PyMySQL
    ansible.builtin.pip:
       name: PyMySQL
       executable: pip3.9


  - name: installing mysql-server
    ansible.builtin.package:
         name: mysql-server
         state: present
  - name: strting and enabling mysql
    ansible.builtin.service:
         name: mysqld
         state: started
         enabled: yes
  
  - name: connecting to mysql-server
    community.mysql.mysql_info:
      login_user: root
      login_password: rafeek2
      login_host: mysql.daws17s.online
    
    register: mysql_info
  

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ mysql_info }}"