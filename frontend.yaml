- name: frontend server
  hosts: frontend
  become: yes
  tasks:
  - name: install nginx
    ansible.builtin.package:
      name: nginx
      state: present
  - name: enable and start the nginx
    ansible.builtin.service:
       name: nginx
       state: started
       enabled: yes
  - name: remove html directory
    ansible.builtin.file:
      path: /usr/share/nginx/html
      state: absent

  - name: create html directory
    ansible.builtin.file:
       path: /usr/share/nginx/html
       state: directory